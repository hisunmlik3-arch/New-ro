<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party - Robot Cinema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/party.css') }}">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <h1>🎬 Watch Party</h1>
        <div class="room-info">
            <p>الغرفة: <strong>{{ room_id }}</strong></p>
            <p>رابط الدعوة: <span class="invite-link" onclick="copyInvite()">{{ request.url }}</span></p>
            <div id="userList"></div>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if is_host and not video_url %}
        <div id="hostControls">
            <p>أدخل IMDb ID أو رابط فيديو مباشر:</p>
            <input type="text" id="searchInput" placeholder="tt0111161 أو رابط mp4/m3u8">
            <button onclick="loadVideoDirect()">تشغيل الرابط</button>
            <div id="status"></div>
        </div>
        {% elif not is_host and not video_url %}
        <p class="waiting">بانتظار المضيف لتحميل الفيديو...</p>
        {% endif %}

        <div class="video-wrapper">
            <video id="videoPlayer" controls crossorigin="anonymous"></video>
        </div>

        <button onclick="leaveParty()">🚪 مغادرة</button>
    </div>

    <script>
        // تمرير البيانات من الخلفية
        const ROOM_ID = "{{ room_id }}";
        const IS_HOST = {{ is_host|tojson }};
        const INITIAL_VIDEO_URL = "{{ video_url }}";
        const INITIAL_VIDEO_TITLE = "{{ video_title }}";
    </script>
    <script src="{{ url_for('static', filename='js/party.js') }}"></script>
</body>
</html>
