<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Robot Cinema Pro | سينما الروبوت برو</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#090a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3658/3658959.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ version }}">
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeProfileModal()">✕</button>
            <h3>👤 الملف الشخصي</h3>
            <p>الأفلام في المفضلة: <span id="statFav">0</span></p>
            <p>الأفلام في السجل: <span id="statHist">0</span></p>
            <p>وقت المشاهدة التقديري: <span id="statTime">0</span> ساعة</p>
            <button onclick="clearAllData()" style="background:#ff4757;color:white;border:none;padding:10px 20px;border-radius:20px;margin-top:10px;cursor:pointer;">🗑️ مسح جميع البيانات</button>
        </div>
    </div>

    <header>
        <div class="header-top">
            <h1 onclick="goHome()" style="cursor:pointer;">Robot Cinema 🎬</h1>
            <div class="header-actions">
                <button class="icon-btn" id="incognitoToggle" title="الوضع المتخفي">🕶️</button>
                <button class="icon-btn" id="profileBtn" title="الملف الشخصي">👤</button>
                <button class="icon-btn" id="shareAppBtn" title="مشاركة التطبيق">🔗</button>
                <button class="icon-btn" id="installBtn" style="display:none;" title="تثبيت">📲</button>
                <button class="icon-btn" id="themeToggle" title="الوضع الليلي">🌙</button>
                <button class="icon-btn" id="viewToggle" title="تغيير العرض">⊞</button>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="ابحث عن فيلم أو مسلسل..." autocomplete="off">
            <button onclick="searchMedia()">بحث</button>
            <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
        </div>
        <div class="continue-row" id="continueRow"></div>
        <div class="filters-bar">
            <select id="typeFilter" class="filter-select" onchange="applyFilters()">
                <option value="movies">🎥 أفلام</option>
                <option value="shows">📺 مسلسلات</option>
            </select>
            <select id="genreFilter" class="filter-select" onchange="applyFilters()">
                <option value="">🔥 الشائع</option>
                <option value="action">💥 أكشن</option>
                <option value="comedy">😂 كوميدي</option>
                <option value="horror">👻 رعب</option>
                <option value="sci-fi">🛸 خيال علمي</option>
                <option value="drama">🎭 دراما</option>
            </select>
            <button class="filter-btn" onclick="showSection('favorites')">❤️ المفضلة</button>
            <button class="filter-btn" onclick="showSection('history')">📜 السجل</button>
            <button class="filter-btn" onclick="showBecauseYouWatched()">💡 لأنك شاهدت</button>
        </div>
    </header>

    <div class="hero-banner" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 class="hero-title" id="heroTitle">مرحباً بك في Robot Cinema Pro</h2>
            <p class="hero-plot" id="heroPlot">أفضل منصة لمشاهدة الأفلام والمسلسلات مجاناً.</p>
            <button class="play-hero-btn" id="heroPlayBtn">▶ شاهد الآن</button>
        </div>
    </div>

    <div class="movies-grid" id="results-grid"></div>

    <div class="player-overlay" id="player-section">
        <div class="player-header">
            <div id="player-title">جاري التشغيل...</div>
            <button class="close-btn" onclick="closePlayer()">✕</button>
        </div>
        <div class="tv-controls" id="tv-controls">
            <select id="season-select" onchange="updateTvEpisode()"></select>
            <select id="episode-select" onchange="updateTvEpisode()"></select>
        </div>
        <div class="iframe-container" id="video-container"></div>
    </div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeInfoModal()">✕</button>
            <img class="detail-poster" id="modalPoster" src="" alt="">
            <h3 id="modalTitle"></h3>
            <p id="modalYear"></p>
            <p id="modalType"></p>
            <p id="modalPlot"></p>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="shareMovie(currentInfoId, currentInfoTitle)" style="flex: 1; background:var(--primary);color:#000;border:none;padding:10px;border-radius:20px;cursor:pointer;font-weight:bold;">🔗 مشاركة</button>
                <button onclick="createWatchParty()" style="flex: 1; background:#ff4757;color:#fff;border:none;padding:10px;border-radius:20px;cursor:pointer;font-weight:bold;">🍿 غرفة مشتركة</button>
            </div>
        </div>
    </div>

    <div class="modal" id="unavailableModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeUnavailableModal()">✕</button>
            <h3 style="color:#ff4757;">⚠️ هذا العمل غير متوفر حالياً</h3>
            <p id="unavailableMessage"></p>
            <div class="suggestions-grid" id="suggestionsGrid"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ version }}"></script>
</body>
</html>
